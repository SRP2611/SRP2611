name: Update Stats Cards

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVGs
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          USERNAME="SRP2611"
          DIR="profile-summary-card-output/tokyonight"
          mkdir -p "$DIR"

          # Fetch yearly data
          fetch_year() {
            gh api graphql -f query="
            query {
              user(login: \"$USERNAME\") {
                contributionsCollection(from: \"${1}-01-01T00:00:00Z\", to: \"${1}-12-31T23:59:59Z\") {
                  totalCommitContributions
                  totalPullRequestContributions
                  totalPullRequestReviewContributions
                  contributionCalendar { totalContributions }
                }
              }
            }" --jq '.data.user.contributionsCollection'
          }

          # Fetch current year
          CURRENT=$(gh api graphql -f query='
          query {
            user(login: "'"$USERNAME"'") {
              contributionsCollection {
                totalCommitContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
                totalRepositoriesWithContributedCommits
                contributionCalendar { totalContributions }
              }
            }
          }' --jq '.data.user.contributionsCollection')

          Y2023=$(fetch_year 2023)
          Y2024=$(fetch_year 2024)
          Y2025=$(fetch_year 2025)

          # Parse numbers
          C2023=$(echo "$Y2023" | jq '.totalCommitContributions')
          C2024=$(echo "$Y2024" | jq '.totalCommitContributions')
          C2025=$(echo "$Y2025" | jq '.totalCommitContributions')
          C2026=$(echo "$CURRENT" | jq '.totalCommitContributions')

          PR2023=$(echo "$Y2023" | jq '.totalPullRequestContributions')
          PR2024=$(echo "$Y2024" | jq '.totalPullRequestContributions')
          PR2025=$(echo "$Y2025" | jq '.totalPullRequestContributions')
          PR2026=$(echo "$CURRENT" | jq '.totalPullRequestContributions')

          RV2023=$(echo "$Y2023" | jq '.totalPullRequestReviewContributions')
          RV2024=$(echo "$Y2024" | jq '.totalPullRequestReviewContributions')
          RV2025=$(echo "$Y2025" | jq '.totalPullRequestReviewContributions')
          RV2026=$(echo "$CURRENT" | jq '.totalPullRequestReviewContributions')

          REPOS=$(echo "$CURRENT" | jq '.totalRepositoriesWithContributedCommits')

          TOTAL_COMMITS=$((C2023 + C2024 + C2025 + C2026))
          TOTAL_PRS=$((PR2023 + PR2024 + PR2025 + PR2026))
          TOTAL_REVIEWS=$((RV2023 + RV2024 + RV2025 + RV2026))

          # Current month of year for monthly average
          CURRENT_MONTH=$(date +%-m)
          M2023=$((C2023 / 12))
          M2024=$((C2024 / 12))
          M2025=$((C2025 / 12))
          M2026=$((C2026 / CURRENT_MONTH))

          # Bar widths (max 180px, relative to max year — leaves room for label)
          MAX=$(echo -e "$M2023\n$M2024\n$M2025\n$M2026" | sort -rn | head -1)
          [ "$MAX" -eq 0 ] && MAX=1
          W2023=$((M2023 * 180 / MAX))
          W2024=$((M2024 * 180 / MAX))
          W2025=$((M2025 * 180 / MAX))
          W2026=$((M2026 * 180 / MAX))

          # Profile details card — fetch user details + last-year contribution graph
          USER_INFO=$(gh api graphql -f query='
          query {
            user(login: "'"$USERNAME"'") {
              name
              company
              createdAt
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
              }
            }
          }' --jq '.data.user')

          NAME=$(echo "$USER_INFO" | jq -r '.name')
          COMPANY=$(echo "$USER_INFO" | jq -r '.company // "—"' | sed 's/^@//')
          CREATED=$(echo "$USER_INFO" | jq -r '.createdAt')
          YEARS=$(( ( $(date +%s) - $(date -d "$CREATED" +%s) ) / 31536000 ))
          YEAR_CONTRIBS=$(echo "$USER_INFO" | jq '.contributionsCollection.contributionCalendar.totalContributions')
          CURRENT_YEAR=$(date +%Y)

          # Build smoothed area chart from weekly aggregates
          POINTS=$(echo "$USER_INFO" | jq -r '
            .contributionsCollection.contributionCalendar.weeks
            | map({date: .contributionDays[0].date, sum: ([.contributionDays[].contributionCount] | add)})
          ')
          MAX_WEEK=$(echo "$POINTS" | jq '[.[].sum] | max')
          [ "$MAX_WEEK" -eq 0 ] && MAX_WEEK=1
          NUM_POINTS=$(echo "$POINTS" | jq 'length')

          # Generate SVG path points (chart area: x 380->840, y 50->180)
          PATH_POINTS=$(echo "$POINTS" | jq -r --arg max "$MAX_WEEK" --arg n "$NUM_POINTS" '
            to_entries | map(
              ((.key * 460 / (($n | tonumber) - 1)) + 380 | floor | tostring) + "," +
              ((180 - (.value.sum * 130 / ($max | tonumber))) | floor | tostring)
            ) | join(" L ")
          ')

          cat > "$DIR/0-profile-details.svg" << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
            <style>* { font-family: 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif }</style>
            <rect x="0.5" y="0.5" rx="6" ry="6" height="219" width="899" stroke="#30363d" stroke-width="1" fill="#0d1117"/>
            <text x="30" y="45" style="font-size: 22px; fill: #70a5fd; font-weight: 600;">${USERNAME} (${NAME})</text>
            <g transform="translate(30, 75)">
              <text x="22" y="14" style="font-size: 14px; fill: #38bdae;">${YEAR_CONTRIBS} Contributions in ${CURRENT_YEAR}</text>
              <text x="0" y="14" style="font-size: 14px; fill: #bb9af7;">⏱</text>

              <text x="22" y="44" style="font-size: 14px; fill: #38bdae;">Joined GitHub ${YEARS} years ago</text>
              <text x="0" y="44" style="font-size: 14px; fill: #bb9af7;">◷</text>

              <text x="22" y="74" style="font-size: 14px; fill: #38bdae;">${COMPANY}</text>
              <text x="0" y="74" style="font-size: 14px; fill: #bb9af7;">⌂</text>
            </g>
            <text x="850" y="55" text-anchor="end" style="font-size: 12px; fill: #38bdae;">contributions in the last year</text>
            <path d="M 380,180 L ${PATH_POINTS} L 840,180 Z" fill="#bb9af7" fill-opacity="0.85"/>
          </svg>
          SVGEOF

          # Stats card
          cat > "$DIR/3-stats.svg" << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200">
            <style>* { font-family: 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif }</style>
            <rect x="0.5" y="0.5" rx="6" ry="6" height="199" width="339" stroke="#30363d" stroke-width="1" fill="#0d1117"/>
            <text x="30" y="40" style="font-size: 20px; fill: #70a5fd;">Stats</text>
            <g transform="translate(30, 60)">
              <text x="0" y="15" style="font-size: 13px; fill: #38bdae;">Total Commits:</text>
              <text x="200" y="15" style="font-size: 14px; fill: #a9b1d6; font-weight: bold;">${TOTAL_COMMITS}</text>
              <text x="0" y="42" style="font-size: 13px; fill: #38bdae;">Pull Requests:</text>
              <text x="200" y="42" style="font-size: 14px; fill: #a9b1d6; font-weight: bold;">${TOTAL_PRS}</text>
              <text x="0" y="69" style="font-size: 13px; fill: #38bdae;">Code Reviews:</text>
              <text x="200" y="69" style="font-size: 14px; fill: #a9b1d6; font-weight: bold;">${TOTAL_REVIEWS}</text>
              <text x="0" y="96" style="font-size: 13px; fill: #38bdae;">Repositories:</text>
              <text x="200" y="96" style="font-size: 14px; fill: #a9b1d6; font-weight: bold;">${REPOS}</text>
            </g>
          </svg>
          SVGEOF

          # Monthly commits card — wider to fit labels after bars
          L2023=$((W2023 + 62))
          L2024=$((W2024 + 62))
          L2025=$((W2025 + 62))
          L2026=$((W2026 + 62))

          cat > "$DIR/4-productive-time.svg" << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
            <style>* { font-family: 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif }</style>
            <rect x="0.5" y="0.5" rx="6" ry="6" height="199" width="399" stroke="#30363d" stroke-width="1" fill="#0d1117"/>
            <text x="30" y="40" style="font-size: 20px; fill: #70a5fd;">Monthly Commits</text>
            <g transform="translate(30, 55)">
              <text x="0" y="22" style="font-size: 13px; fill: #a9b1d6;">2023</text>
              <rect x="55" y="10" width="180" height="18" rx="3" fill="#2a2e3a"/>
              <rect x="55" y="10" width="${W2023}" height="18" rx="3" fill="#38bdae"/>
              <text x="${L2023}" y="24" style="font-size: 12px; fill: #a9b1d6;">~${M2023}/mo</text>

              <text x="0" y="52" style="font-size: 13px; fill: #a9b1d6;">2024</text>
              <rect x="55" y="40" width="180" height="18" rx="3" fill="#2a2e3a"/>
              <rect x="55" y="40" width="${W2024}" height="18" rx="3" fill="#70a5fd"/>
              <text x="${L2024}" y="54" style="font-size: 12px; fill: #a9b1d6;">~${M2024}/mo</text>

              <text x="0" y="82" style="font-size: 13px; fill: #a9b1d6;">2025</text>
              <rect x="55" y="70" width="180" height="18" rx="3" fill="#2a2e3a"/>
              <rect x="55" y="70" width="${W2025}" height="18" rx="3" fill="#bb9af7"/>
              <text x="${L2025}" y="84" style="font-size: 12px; fill: #a9b1d6;">~${M2025}/mo</text>

              <text x="0" y="112" style="font-size: 13px; fill: #a9b1d6;">2026</text>
              <rect x="55" y="100" width="180" height="18" rx="3" fill="#2a2e3a"/>
              <rect x="55" y="100" width="${W2026}" height="18" rx="3" fill="#f7768e"/>
              <text x="${L2026}" y="114" style="font-size: 12px; fill: #a9b1d6;">~${M2026}/mo</text>
            </g>
          </svg>
          SVGEOF

          echo "Stats: commits=$TOTAL_COMMITS prs=$TOTAL_PRS reviews=$TOTAL_REVIEWS repos=$REPOS"
          echo "Monthly: 2023=~${M2023} 2024=~${M2024} 2025=~${M2025} 2026=~${M2026}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto-update stats cards [skip ci]"
          git push
